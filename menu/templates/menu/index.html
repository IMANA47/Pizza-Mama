{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'menu/css/style.css' %}">
   <link rel="icon" href="{% static 'menu/images/small_logo.png' %}" type="image/png">
    <title>Menu des pizzas</title>
</head>
<body>
    <header>
    <!-- Responsive Logo -->
     <a href="{% url 'main:index' %}"><img src="{% static 'menu/images/small_logo.png' %}" alt="Site Logo" class="logo"></a>
    
</header>
    <div class="menu_title">
        <h1>Nos pizzas :</h1>
    </div>
    <div class="menu_list">
        {% for pizza in pizzas %}
            <div class="menu_liste_item">
                <span class="menu_liste_title">{{ pizza.nom }}</span> 
                <span class="menu_liste_price">{{ pizza.prix }}€</span>
                <span class="menu_liste_ingredients">{{ pizza.ingredients }}</span>
              {% if pizza.vegetarienne %}
                <span class="menu_liste_vegetarienne">Végétarienne</span>
              {% endif %}
         
            </div>
        {% endfor %}
    </div>
    <footer>
        <p>&copy; 2026 <b>Pizza Mama.</b> Tous droits réservés.</p>
    </footer>
</body>
</html>
